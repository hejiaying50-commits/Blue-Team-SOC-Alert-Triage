rules:
  - rule_id: WEB-001
    name: SQL Injection Probe
    severity: high
    match_fields:
      - request_uri
      - user_agent
    keywords:
      - "union select"
      - "or 1=1"
      - "sleep("
      - "information_schema"
      - "benchmark("
    attack_type: SQL Injection Probe
    recommendation: 检查参数过滤、数据库错误回显和 WAF 拦截策略，必要时封禁源 IP。

  - rule_id: WEB-002
    name: XSS Probe
    severity: medium
    match_fields:
      - request_uri
    keywords:
      - "<script"
      - "onerror="
      - "javascript:"
      - "alert("
    attack_type: XSS Probe
    recommendation: 检查输入过滤、输出编码和前端响应内容。

  - rule_id: WEB-003
    name: Sensitive File Scan
    severity: medium
    match_fields:
      - request_uri
    keywords:
      - ".env"
      - ".git"
      - "config.php"
      - "wp-config.php"
      - "backup.zip"
    attack_type: Sensitive File Scan
    recommendation: 检查敏感文件是否暴露，确认 Web 根目录权限。

  - rule_id: WEB-004
    name: File Upload Probe
    severity: high
    match_fields:
      - request_uri
    keywords:
      - "shell.php"
      - "test.jsp"
      - "upload.php"
      - ".asp"
      - ".aspx"
    attack_type: File Upload Probe
    recommendation: 检查上传目录权限、文件类型校验和 WebShell 风险。

  - rule_id: UA-001
    name: Automated Scanner
    severity: medium
    match_fields:
      - user_agent
    keywords:
      - "sqlmap"
      - "nikto"
      - "dirbuster"
      - "python-requests"
      - "curl"
    attack_type: Automated Scanner
    recommendation: 结合访问频率判断是否为自动化扫描，必要时临时封禁。

  - rule_id: AUTH-001
    name: Brute Force Login
    severity: high
    condition: same_src_ip_failed_login_count >= 10 within 5 minutes
    attack_type: Brute Force Login
    recommendation: 封禁源 IP，锁定异常账号，开启验证码、MFA 或登录限速。

  - rule_id: WEB-005
    name: Directory Brute Force
    severity: medium
    condition: same_src_ip_404_count >= 20 within 5 minutes
    attack_type: Directory Brute Force
    recommendation: 检查是否存在敏感目录暴露，限制高频访问源 IP。

  - rule_id: IDS-001
    name: IDS High Severity Alert
    severity: high
    condition: suricata severity <= 2
    attack_type: IDS Alert
    recommendation: 结合五元组、目标资产和 Web 日志进一步确认攻击是否成功。
